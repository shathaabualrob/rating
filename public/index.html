<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate It</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Rate It</h1>

    <div class="create-form">
      <h2>Create a Post</h2>
      <input type="text" id="title" placeholder="Title" maxlength="200">
      <textarea id="body" placeholder="What do you want people to rate?"></textarea>
      <button id="submit-btn">Post</button>
    </div>

    <div id="posts"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
